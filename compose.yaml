services:
  agent-over-protocol:
    build:
      context: .
      dockerfile: Containerfile
    image: agent-over-protocol:latest
    restart: unless-stopped
    ports:
      - "${AOP_HOST_PORT}:8000"
    environment:
      AGENT_BASE_URL: "${AGENT_BASE_URL}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
    volumes:
      - agent-context:/context:ro
      - agent-data:/data
    depends_on:
      - tika
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz', timeout=3).read()"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  filebrowser:
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT}:8080"
    volumes:
      - agent-context:/srv
      - filebrowser-database:/database
    command:
      - --address
      - 0.0.0.0
      - --port
      - "8080"
      - --root
      - /srv
      - --database
      - /database/filebrowser.db

  tika:
    image: apache/tika:latest-full
    restart: unless-stopped

volumes:
  agent-context:
  agent-data:
  filebrowser-database:
